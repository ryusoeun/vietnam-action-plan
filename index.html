<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 Vietnam Public Service Training Program | Team Action Plan Standard</title>
    <style>
      body { margin: 0; font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif; background: #f7f8fa; color: #20242b; }
      .loading { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
      .loading strong { display: block; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div class="loading"><div><strong>Loading action plan...</strong><span>Please wait a moment.</span></div></div>
    <script>
      (async function loadEditableActionPlan() {
        const source = "https://raw.githubusercontent.com/ryusoeun/vietnam-action-plan/b01b69f17b59d2a84921dd7e69f4e8e93b6dd837/index.html";
        const version = "20260622-autosave-github";
        try {
          let html = await fetch(source, { cache: "no-store" }).then((response) => {
            if (!response.ok) throw new Error("Could not load source page");
            return response.text();
          });
          html = html.replace("</head>", `<link rel="stylesheet" href="styles.css?v=${version}" /></head>`);
          if (!html.includes("data-autosave-status")) {
            html = html.replace(
              '<div class="top-actions">',
              '<div class="top-actions"><span class="autosave-status" data-autosave-status>Saved locally</span>',
            );
          }
          if (!html.includes("data-save-github")) {
            html = html.replace(
              '<button class="ghost-button" type="button" data-save-edits>Save</button>',
              '<button class="ghost-button" type="button" data-save-edits>Save</button><button class="primary-button" type="button" data-save-github>Save to GitHub</button>',
            );
          }
          html = html.replace(/\s*<script>[\s\S]*?<\/script>\s*<\/body>/, `\n<script src="script.js?v=${version}"><\/script>\n</body>`);
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          document.body.innerHTML = '<div class="loading"><div><strong>Could not load the action plan.</strong><span>Please refresh the page.</span></div></div>';
          console.error(error);
        }
      })();
    </script>
  </body>
</html>
